<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

            display: block;

<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
//  SYNAPTIC INVADERS — La Batalla en el Espacio Sináptico
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// --- Scale canvas to fit window ---
function resizeCanvas() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ============================================================
//  AUDIO ENGINE (Web Audio API — procedural sounds)
// ============================================================
let audioCtx = null;
let masterGain = null;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'square', vol = 0.3, detune = 0) {
    ensureAudio();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + duration);
}

function playNoise(duration, vol = 0.2) {
    ensureAudio();
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    noise.connect(gain);
    gain.connect(masterGain);
    noise.start(t);
    noise.stop(t + duration);
}

const SFX = {
    shootFluoxetina() {
        playTone(1200, 0.08, 'square', 0.15);
        playTone(1800, 0.05, 'sine', 0.1);
    },
    shootSertralina() {
        playTone(800, 0.06, 'sawtooth', 0.12);
        playTone(1000, 0.06, 'sawtooth', 0.1);
        playTone(600, 0.06, 'sawtooth', 0.1);
    },
    shootAnsiolitico() {
        playTone(300, 0.25, 'sine', 0.2);
        playTone(350, 0.2, 'sine', 0.15, 10);
    },
    explosion() {
        playNoise(0.25, 0.25);
        playTone(120, 0.2, 'square', 0.15);
    },
    smallHit() {
        playNoise(0.08, 0.15);
        playTone(400, 0.06, 'square', 0.1);
    },
    playerHit() {
        playNoise(0.4, 0.3);
        playTone(200, 0.3, 'sawtooth', 0.2);
        playTone(100, 0.4, 'square', 0.15);
    },
    weaponSwitch() {
        playTone(600, 0.05, 'sine', 0.15);
        setTimeout(() => playTone(900, 0.05, 'sine', 0.15), 50);
    },
    gameOver() {
        playTone(400, 0.3, 'square', 0.2);
        setTimeout(() => playTone(300, 0.3, 'square', 0.2), 200);
        setTimeout(() => playTone(200, 0.5, 'square', 0.2), 400);
    },
    waveComplete() {
        playTone(500, 0.15, 'sine', 0.2);
        setTimeout(() => playTone(700, 0.15, 'sine', 0.2), 120);
        setTimeout(() => playTone(1000, 0.2, 'sine', 0.2), 240);
    },
    powerUp() {
        playTone(600, 0.1, 'sine', 0.15);
        setTimeout(() => playTone(800, 0.1, 'sine', 0.15), 80);
        setTimeout(() => playTone(1200, 0.15, 'sine', 0.2), 160);
    }
};

// ============================================================
//  INPUT
// ============================================================
const keysDown = new Set();
const keysJust = new Set();

window.addEventListener('keydown', e => {
    const c = e.code;
    if (['KeyA','KeyD','ArrowLeft','ArrowRight','Space','Enter'].includes(c)) {
        e.preventDefault();
        if (!keysDown.has(c)) keysJust.add(c);
        keysDown.add(c);
    }
});
window.addEventListener('keyup', e => {
    keysDown.delete(e.code);
});

function justPressed(code) { return keysJust.has(code); }
function isDown(code) { return keysDown.has(code); }
function clearJust() { keysJust.clear(); }

// ============================================================
//  WEAPON DEFINITIONS
// ============================================================
const WEAPONS = [
    {
        name: 'FLUOXETINA',
        subtitle: 'ISRS — Disparo Preciso',
        color: '#00d4ff',
        colorDark: '#006688',
        rgb: [0, 212, 255],
        fireRate: 170,
        damage: 1,
        speed: 9,
        pattern: 'single'    // single focused beam
    },
    {
        name: 'SERTRALINA',
        subtitle: 'ISRS — Ráfaga Amplia',
        color: '#00ff88',
        colorDark: '#008844',
        rgb: [0, 255, 136],
        fireRate: 300,
        damage: 1,
        speed: 7,
        pattern: 'spread'    // 3-way spread
    },
    {
        name: 'ANSIOLÍTICO',
        subtitle: 'Onda Tranquilizante',
        color: '#cc66ff',
        colorDark: '#663388',
        rgb: [204, 102, 255],
        fireRate: 520,
        damage: 3,
        speed: 4.5,
        pattern: 'wave'      // slow wide pulse
    }
];

// ============================================================
//  GAME STATE
// ============================================================
let state = 'title';  // title | playing | gameover | waveIntro
let score = 0;
let highScore = parseInt(localStorage.getItem('synapticHS') || '0');
let lives = 3;
let wave = 0;
let weaponIndex = 0;
let switchCooldown = 0;
let lastShotTime = 0;
let gameTime = 0;

// Player
let px, py;
const PW = 44, PH = 28;
const PLAYER_SPEED = 320;
let playerInvTimer = 0;

// Entity arrays
let bullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let bgParticles = [];
let scorePopups = [];
let screenShake = 0;

// Enemy formation
let enemyDir = 1;
let enemySpeedBase = 30;
let enemyDropAmount = 18;
let enemyShootChance = 0.002;

// Wave intro
let waveIntroTimer = 0;

// Title animation
let titleTime = 0;

// ============================================================
//  BACKGROUND PARTICLES (ambient neurotransmitter vesicles)
// ============================================================
function initBgParticles() {
    bgParticles = [];
    for (let i = 0; i < 60; i++) {
        bgParticles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: 1 + Math.random() * 2.5,
            speed: 0.15 + Math.random() * 0.4,
            alpha: 0.15 + Math.random() * 0.3,
            hue: 240 + Math.random() * 80,
            drift: (Math.random() - 0.5) * 0.3
        });
    }
}
initBgParticles();

function updateBgParticles() {
    for (const p of bgParticles) {
        p.y += p.speed;
        p.x += p.drift + Math.sin(gameTime * 0.5 + p.x * 0.01) * 0.15;
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
    }
}

// ============================================================
//  DRAWING HELPERS
// ============================================================

function drawGlow(x, y, r, color, alpha = 0.4) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = r * 2;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawBackground() {
    // Deep gradient
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#0d0020');
    grd.addColorStop(0.3, '#0a0018');
    grd.addColorStop(0.5, '#080014');
    grd.addColorStop(0.7, '#0a0018');
    grd.addColorStop(1, '#0d0020');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Neuron membrane — TOP (presynaptic)
    ctx.save();
    ctx.fillStyle = 'rgba(60, 20, 100, 0.4)';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W, 0);
    ctx.lineTo(W, 55);
    for (let x = W; x >= 0; x -= 1) {
        const y = 50 + Math.sin(x * 0.025 + gameTime * 0.3) * 8
                     + Math.sin(x * 0.06) * 5
                     + Math.sin(x * 0.01 + 1) * 12;
        ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    // Glow line on top membrane
    ctx.strokeStyle = 'rgba(140, 80, 220, 0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 1) {
        const y = 50 + Math.sin(x * 0.025 + gameTime * 0.3) * 8
                     + Math.sin(x * 0.06) * 5
                     + Math.sin(x * 0.01 + 1) * 12;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Vesicles on top membrane
    for (let i = 0; i < 8; i++) {
        const vx = 50 + i * 100 + Math.sin(gameTime * 0.4 + i) * 10;
        const vy = 30 + Math.sin(gameTime * 0.5 + i * 2) * 6;
        ctx.fillStyle = 'rgba(180, 100, 255, 0.25)';
        ctx.beginPath();
        ctx.arc(vx, vy, 6 + Math.sin(gameTime + i) * 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Neuron membrane — BOTTOM (postsynaptic)
    ctx.fillStyle = 'rgba(60, 20, 100, 0.4)';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(W, H);
    const bottomBase = H - 45;
    ctx.lineTo(W, bottomBase);
    for (let x = W; x >= 0; x -= 1) {
        const y = bottomBase - Math.sin(x * 0.03 + gameTime * 0.25) * 6
                              - Math.sin(x * 0.07 + 2) * 4
                              - Math.sin(x * 0.012) * 10;
        ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    // Receptors on bottom membrane
    for (let i = 0; i < 12; i++) {
        const rx = 35 + i * 65;
        const ry = H - 30 + Math.sin(gameTime * 0.3 + i * 1.5) * 3;
        ctx.fillStyle = 'rgba(100, 200, 180, 0.2)';
        ctx.fillRect(rx - 3, ry - 10, 6, 12);
        ctx.fillStyle = 'rgba(100, 220, 180, 0.3)';
        ctx.beginPath();
        ctx.arc(rx, ry - 12, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Glow line on bottom membrane
    ctx.strokeStyle = 'rgba(100, 200, 180, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 1) {
        const y = bottomBase - Math.sin(x * 0.03 + gameTime * 0.25) * 6
                              - Math.sin(x * 0.07 + 2) * 4
                              - Math.sin(x * 0.012) * 10;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();

    // Background particles (floating vesicles)
    for (const p of bgParticles) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = `hsl(${p.hue}, 70%, 70%)`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = `hsl(${p.hue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// --- Draw Player (capsule / pill shape) ---
function drawPlayer() {
    if (playerInvTimer > 0 && Math.floor(playerInvTimer * 10) % 2 === 0) return;
    const w = WEAPONS[weaponIndex];
    const cx = px, cy = py;

    ctx.save();

    // Glow under player
    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 4) * 0.1;
    ctx.shadowBlur = 25;
    ctx.shadowColor = w.color;
    ctx.fillStyle = w.color;
    ctx.beginPath();
    ctx.ellipse(cx, cy + PH / 2 + 4, PW / 2 + 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Capsule body
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 12;
    ctx.shadowColor = w.color;

    const grd = ctx.createLinearGradient(cx - PW / 2, cy - PH / 2, cx + PW / 2, cy + PH / 2);
    grd.addColorStop(0, w.color);
    grd.addColorStop(0.5, w.colorDark);
    grd.addColorStop(1, w.color);
    ctx.fillStyle = grd;

    // Main capsule shape (rounded rect)
    const r = PH / 2;
    ctx.beginPath();
    ctx.moveTo(cx - PW / 2 + r, cy - PH / 2);
    ctx.lineTo(cx + PW / 2 - r, cy - PH / 2);
    ctx.arc(cx + PW / 2 - r, cy, r, -Math.PI / 2, Math.PI / 2);
    ctx.lineTo(cx - PW / 2 + r, cy + PH / 2);
    ctx.arc(cx - PW / 2 + r, cy, r, Math.PI / 2, -Math.PI / 2);
    ctx.closePath();
    ctx.fill();

    // Center line on capsule
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - PH / 2 + 2);
    ctx.lineTo(cx, cy + PH / 2 - 2);
    ctx.stroke();

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(cx, cy - PH / 4, PW / 3, PH / 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cannon tip
    ctx.fillStyle = w.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(cx - 3, cy - PH / 2 - 6, 6, 8);

    // Small wings
    ctx.fillStyle = w.colorDark;
    ctx.shadowBlur = 0;
    // Left wing
    ctx.beginPath();
    ctx.moveTo(cx - PW / 2, cy + 2);
    ctx.lineTo(cx - PW / 2 - 10, cy + PH / 2 + 4);
    ctx.lineTo(cx - PW / 2, cy + PH / 2);
    ctx.closePath();
    ctx.fill();
    // Right wing
    ctx.beginPath();
    ctx.moveTo(cx + PW / 2, cy + 2);
    ctx.lineTo(cx + PW / 2 + 10, cy + PH / 2 + 4);
    ctx.lineTo(cx + PW / 2, cy + PH / 2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// --- Draw Cortisol Enemy ---
function drawEnemy(e) {
    const cx = e.x, cy = e.y;
    const s = e.size;
    ctx.save();

    // Pulsing
    const pulse = 1 + Math.sin(gameTime * 4 + e.x * 0.1) * 0.05;

    // Glow
    ctx.globalAlpha = 0.3;
    ctx.shadowBlur = 15;
    ctx.shadowColor = e.color;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(cx, cy, s * pulse + 4, 0, Math.PI * 2);
    ctx.fill();

    // Hexagonal body (cortisol molecule)
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 8;
    ctx.shadowColor = e.color;
    const grd = ctx.createRadialGradient(cx - s * 0.2, cy - s * 0.2, 2, cx, cy, s * pulse);
    grd.addColorStop(0, e.colorLight);
    grd.addColorStop(0.7, e.color);
    grd.addColorStop(1, e.colorDark);
    ctx.fillStyle = grd;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const hx = cx + Math.cos(angle) * s * pulse;
        const hy = cy + Math.sin(angle) * s * pulse;
        if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fill();

    // Inner hex detail
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const hx = cx + Math.cos(angle) * s * 0.55;
        const hy = cy + Math.sin(angle) * s * 0.55;
        if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.stroke();

    // Small protrusions (molecular bonds)
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i += 2) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const bx1 = cx + Math.cos(angle) * s * pulse;
        const by1 = cy + Math.sin(angle) * s * pulse;
        const bx2 = cx + Math.cos(angle) * (s * pulse + 5);
        const by2 = cy + Math.sin(angle) * (s * pulse + 5);
        ctx.beginPath();
        ctx.moveTo(bx1, by1);
        ctx.lineTo(bx2, by2);
        ctx.stroke();
        ctx.fillStyle = e.colorLight;
        ctx.beginPath();
        ctx.arc(bx2, by2, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Health indicator (for tougher enemies)
    if (e.maxHp > 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(cx - s, cy + s + 4, s * 2, 3);
        ctx.fillStyle = e.color;
        ctx.fillRect(cx - s, cy + s + 4, s * 2 * (e.hp / e.maxHp), 3);
    }

    ctx.restore();
}

// --- Draw Bullet ---
function drawBullet(b) {
    ctx.save();
    const w = WEAPONS[b.weapon];

    if (b.type === 'single') {
        // Focused beam (Fluoxetina)
        ctx.shadowBlur = 10;
        ctx.shadowColor = w.color;
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x, b.y + 12);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 2);
        ctx.lineTo(b.x, b.y + 10);
        ctx.stroke();
        // Trail
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 12);
        ctx.lineTo(b.x, b.y + 28);
        ctx.stroke();

    } else if (b.type === 'spread') {
        // Spread pellet (Sertralina)
        ctx.shadowBlur = 8;
        ctx.shadowColor = w.color;
        ctx.fillStyle = w.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
        ctx.fill();

    } else if (b.type === 'wave') {
        // Wide pulse (Ansiolítico)
        const pulse = 1 + Math.sin(gameTime * 12) * 0.15;
        ctx.shadowBlur = 18;
        ctx.shadowColor = w.color;
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = w.color;
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 16 * pulse, 7 * pulse, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 8 * pulse, 3 * pulse, 0, 0, Math.PI * 2);
        ctx.fill();
        // Outer ring
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, 20 * pulse, 10 * pulse, 0, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();
}

// --- Draw enemy bullet ---
function drawEnemyBullet(b) {
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff4444';
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc88';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
function spawnParticles(x, y, color, count, speed = 3, life = 0.6) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = (0.5 + Math.random()) * speed;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: life + Math.random() * 0.3,
            maxLife: life + Math.random() * 0.3,
            r: 1 + Math.random() * 3,
            color
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// ============================================================
//  SCORE POPUPS
// ============================================================
function spawnScorePopup(x, y, text, color) {
    scorePopups.push({ x, y, text, color, life: 1.0 });
}

function updateScorePopups(dt) {
    for (let i = scorePopups.length - 1; i >= 0; i--) {
        const p = scorePopups[i];
        p.y -= 40 * dt;
        p.life -= dt;
        if (p.life <= 0) scorePopups.splice(i, 1);
    }
}

function drawScorePopups() {
    for (const p of scorePopups) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.font = '700 14px Orbitron, monospace';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
    }
}

// ============================================================
//  ENEMY SPAWNING
// ============================================================
function spawnWave(waveNum) {
    enemies = [];
    const rows = Math.min(3 + Math.floor(waveNum / 2), 6);
    const cols = Math.min(6 + Math.floor(waveNum / 3), 10);
    const spacingX = 58;
    const spacingY = 45;
    const startX = (W - (cols - 1) * spacingX) / 2;
    const startY = 80;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let hp = 1, size = 14, scoreVal = 100, color, colorLight, colorDark;
            if (r === 0) {
                // Top row — tougher
                hp = Math.min(1 + Math.floor(waveNum / 3), 4);
                size = 16;
                scoreVal = 300;
                color = '#ff2244';
                colorLight = '#ff6688';
                colorDark = '#aa1133';
            } else if (r <= 2) {
                hp = Math.min(1 + Math.floor(waveNum / 4), 3);
                size = 14;
                scoreVal = 200;
                color = '#ff6622';
                colorLight = '#ff9955';
                colorDark = '#aa4411';
            } else {
                hp = 1;
                size = 12;
                scoreVal = 100;
                color = '#ff9933';
                colorLight = '#ffbb66';
                colorDark = '#aa6622';
            }
            enemies.push({
                x: startX + c * spacingX,
                y: startY + r * spacingY,
                hp, maxHp: hp, size, scoreVal,
                color, colorLight, colorDark,
                alive: true
            });
        }
    }
    enemyDir = 1;
    enemySpeedBase = 25 + waveNum * 5;
    enemyShootChance = 0.001 + waveNum * 0.0005;
}

// ============================================================
//  PLAYER SHOOTING
// ============================================================
function playerShoot() {
    const w = WEAPONS[weaponIndex];
    const now = performance.now();
    if (now - lastShotTime < w.fireRate) return;
    lastShotTime = now;

    if (w.pattern === 'single') {
        bullets.push({
            x: px, y: py - PH / 2 - 8,
            vx: 0, vy: -w.speed,
            weapon: weaponIndex, type: 'single', damage: w.damage
        });
        SFX.shootFluoxetina();

    } else if (w.pattern === 'spread') {
        const angles = [-0.2, 0, 0.2];
        for (const a of angles) {
            bullets.push({
                x: px, y: py - PH / 2 - 4,
                vx: Math.sin(a) * w.speed * 0.6,
                vy: -w.speed * Math.cos(a),
                weapon: weaponIndex, type: 'spread', damage: w.damage
            });
        }
        SFX.shootSertralina();

    } else if (w.pattern === 'wave') {
        bullets.push({
            x: px, y: py - PH / 2 - 8,
            vx: 0, vy: -w.speed,
            weapon: weaponIndex, type: 'wave', damage: w.damage
        });
        SFX.shootAnsiolitico();
    }

    // Muzzle flash particles
    spawnParticles(px, py - PH / 2 - 4, w.color, 5, 2, 0.2);
}

// ============================================================
//  COLLISION DETECTION
// ============================================================
function checkCollisions() {
    // Bullets vs Enemies
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        const bRadius = b.type === 'wave' ? 16 : (b.type === 'spread' ? 4 : 3);
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
            const e = enemies[ei];
            if (!e.alive) continue;
            const dx = b.x - e.x, dy = b.y - e.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < bRadius + e.size) {
                e.hp -= b.damage;
                bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    e.alive = false;
                    score += e.scoreVal;
                    SFX.explosion();
                    spawnParticles(e.x, e.y, e.color, 18, 4, 0.7);
                    spawnParticles(e.x, e.y, '#ffcc44', 8, 3, 0.4);
                    spawnScorePopup(e.x, e.y, '+' + e.scoreVal, e.color);
                } else {
                    SFX.smallHit();
                    spawnParticles(e.x, e.y, e.color, 6, 2, 0.3);
                }
                break;
            }
        }
    }

    // Enemy bullets vs Player
    if (playerInvTimer <= 0) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const b = enemyBullets[i];
            const dx = b.x - px, dy = b.y - py;
            if (Math.abs(dx) < PW / 2 + 3 && Math.abs(dy) < PH / 2 + 3) {
                enemyBullets.splice(i, 1);
                playerGotHit();
                break;
            }
        }
    }

    // Enemies reaching player level
    if (playerInvTimer <= 0) {
        for (const e of enemies) {
            if (!e.alive) continue;
            if (e.y + e.size >= py - PH / 2) {
                playerGotHit();
                break;
            }
        }
    }
}

function playerGotHit() {
    lives--;
    playerInvTimer = 2.5;
    screenShake = 0.4;
    SFX.playerHit();
    spawnParticles(px, py, '#ffffff', 20, 5, 0.8);
    spawnParticles(px, py, WEAPONS[weaponIndex].color, 15, 4, 0.6);
    if (lives <= 0) {
        state = 'gameover';
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('synapticHS', String(highScore));
        }
        SFX.gameOver();
    }
}

// ============================================================
//  UPDATE
// ============================================================
function update(dt) {
    gameTime += dt;
    updateBgParticles();

    if (state === 'title') {
        titleTime += dt;
        if (justPressed('Space') || justPressed('Enter')) {
            ensureAudio();
            startGame();
        }
        clearJust();
        return;
    }

    if (state === 'gameover') {
        updateParticles(dt);
        updateScorePopups(dt);
        if (justPressed('Space') || justPressed('Enter')) {
            startGame();
        }
        clearJust();
        return;
    }

    if (state === 'waveIntro') {
        waveIntroTimer -= dt;
        if (waveIntroTimer <= 0) {
            state = 'playing';
        }
        clearJust();
        return;
    }

    // --- PLAYING ---

    // Player movement
    if (isDown('KeyA')) px -= PLAYER_SPEED * dt;
    if (isDown('KeyD')) px += PLAYER_SPEED * dt;
    px = Math.max(PW / 2 + 12, Math.min(W - PW / 2 - 12, px));

    // Weapon switch
    if (switchCooldown > 0) switchCooldown -= dt;
    if (switchCooldown <= 0) {
        if (justPressed('ArrowRight')) {
            weaponIndex = (weaponIndex + 1) % WEAPONS.length;
            switchCooldown = 0.25;
            SFX.weaponSwitch();
        }
        if (justPressed('ArrowLeft')) {
            weaponIndex = (weaponIndex - 1 + WEAPONS.length) % WEAPONS.length;
            switchCooldown = 0.25;
            SFX.weaponSwitch();
        }
    }

    // Shooting
    if (isDown('Space')) {
        playerShoot();
    }

    // Invincibility timer
    if (playerInvTimer > 0) playerInvTimer -= dt;
    if (screenShake > 0) screenShake -= dt;

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -20 || b.x < -20 || b.x > W + 20) bullets.splice(i, 1);
    }

    // Update enemy bullets
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += b.vy;
        if (b.y > H + 10) enemyBullets.splice(i, 1);
    }

    // Update enemies (Space Invaders movement)
    const aliveEnemies = enemies.filter(e => e.alive);
    if (aliveEnemies.length > 0) {
        const speedMultiplier = 1 + (1 - aliveEnemies.length / Math.max(enemies.length, 1)) * 2;
        const speed = enemySpeedBase * speedMultiplier * dt;
        let hitEdge = false;

        for (const e of aliveEnemies) {
            e.x += enemyDir * speed;
        }

        // Check edges
        for (const e of aliveEnemies) {
            if (e.x < e.size + 15 || e.x > W - e.size - 15) {
                hitEdge = true;
                break;
            }
        }

        if (hitEdge) {
            enemyDir *= -1;
            for (const e of aliveEnemies) {
                e.y += enemyDropAmount;
            }
        }

        // Enemy shooting
        for (const e of aliveEnemies) {
            if (Math.random() < enemyShootChance) {
                enemyBullets.push({
                    x: e.x, y: e.y + e.size,
                    vy: 3.5 + wave * 0.3
                });
            }
        }
    }

    // Remove dead enemies
    enemies = enemies.filter(e => e.alive);

    // Check if wave is cleared
    if (enemies.length === 0) {
        wave++;
        SFX.waveComplete();
        state = 'waveIntro';
        waveIntroTimer = 2.0;
        bullets = [];
        enemyBullets = [];
        spawnWave(wave);
    }

    // Collisions
    checkCollisions();

    // Particles
    updateParticles(dt);
    updateScorePopups(dt);

    clearJust();
}

// ============================================================
//  RENDER
// ============================================================
function render() {
    ctx.save();

    // Screen shake
    if (screenShake > 0) {
        const sx = (Math.random() - 0.5) * screenShake * 16;
        const sy = (Math.random() - 0.5) * screenShake * 16;
        ctx.translate(sx, sy);
    }

    drawBackground();

    if (state === 'title') {
        renderTitle();
    } else if (state === 'waveIntro') {
        drawPlayer();
        renderWaveIntro();
    } else if (state === 'playing') {
        // Enemies
        for (const e of enemies) drawEnemy(e);
        // Enemy bullets
        for (const b of enemyBullets) drawEnemyBullet(b);
        // Player bullets
        for (const b of bullets) drawBullet(b);
        // Player
        drawPlayer();
        // Particles
        drawParticles();
        drawScorePopups();
        // HUD
        renderHUD();
    } else if (state === 'gameover') {
        // Enemies (frozen)
        for (const e of enemies) drawEnemy(e);
        drawParticles();
        drawScorePopups();
        renderGameOver();
    }

    ctx.restore();
}

// ============================================================
//  UI SCREENS
// ============================================================
function renderTitle() {
    // Overlay
    ctx.fillStyle = 'rgba(5, 0, 15, 0.55)';
    ctx.fillRect(0, 0, W, H);

    // Title
    const glow = 0.7 + Math.sin(titleTime * 2) * 0.3;
    ctx.save();
    ctx.textAlign = 'center';

    // Main title
    ctx.shadowBlur = 30;
    ctx.shadowColor = `rgba(140, 80, 255, ${glow})`;
    ctx.fillStyle = '#fff';
    ctx.font = '900 42px Orbitron, monospace';
    ctx.fillText('SYNAPTIC', W / 2, 160);
    ctx.font = '900 50px Orbitron, monospace';
    ctx.shadowColor = `rgba(0, 200, 255, ${glow})`;
    ctx.fillText('INVADERS', W / 2, 215);

    // Subtitle
    ctx.shadowBlur = 0;
    ctx.font = '600 14px Rajdhani, sans-serif';
    ctx.fillStyle = 'rgba(180, 160, 220, 0.8)';
    ctx.fillText('La Batalla en el Espacio Sináptico', W / 2, 245);

    // Weapon descriptions
    const weaponY = 300;
    for (let i = 0; i < WEAPONS.length; i++) {
        const w = WEAPONS[i];
        const yy = weaponY + i * 50;
        ctx.fillStyle = w.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = w.color;
        ctx.font = '700 15px Orbitron, monospace';
        ctx.fillText(w.name, W / 2, yy);
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(200,200,220,0.6)';
        ctx.font = '400 12px Rajdhani, sans-serif';
        ctx.fillText(w.subtitle, W / 2, yy + 18);
    }

    // Controls
    ctx.fillStyle = 'rgba(200,200,220,0.5)';
    ctx.font = '400 13px Rajdhani, sans-serif';
    ctx.fillText('A / D — Mover   |   ← → — Cambiar Arma   |   ESPACIO — Disparar', W / 2, 492);

    // Start prompt (blinking)
    if (Math.floor(titleTime * 2) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00ccff';
        ctx.font = '700 18px Orbitron, monospace';
        ctx.fillText('PRESIONA ESPACIO PARA COMENZAR', W / 2, 540);
    }

    // High score
    if (highScore > 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,200,50,0.7)';
        ctx.font = '600 13px Rajdhani, sans-serif';
        ctx.fillText('RÉCORD: ' + highScore, W / 2, 570);
    }

    ctx.restore();
}

function renderWaveIntro() {
    ctx.save();
    ctx.textAlign = 'center';

    const alpha = Math.min(1, waveIntroTimer);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#cc66ff';
    ctx.font = '900 38px Orbitron, monospace';
    ctx.fillText('OLEADA ' + wave, W / 2, H / 2 - 10);

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(200,180,255,0.7)';
    ctx.font = '600 16px Rajdhani, sans-serif';
    const msgs = [
        'El cortisol se aproxima...',
        'Los niveles de estrés aumentan...',
        'La sinapsis está bajo ataque...',
        'Más cortisol detectado...',
        '¡Resistencia aumentando!'
    ];
    ctx.fillText(msgs[Math.min(wave - 1, msgs.length - 1)], W / 2, H / 2 + 25);

    ctx.restore();
}

function renderHUD() {
    ctx.save();

    // Score — top left
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.font = '700 16px Orbitron, monospace';
    ctx.shadowBlur = 4;
    ctx.shadowColor = '#8844cc';
    ctx.fillText('SCORE', 20, 25);
    ctx.font = '700 22px Orbitron, monospace';
    ctx.fillText(String(score).padStart(7, '0'), 20, 50);

    // Wave — top center
    ctx.textAlign = 'center';
    ctx.font = '600 13px Rajdhani, sans-serif';
    ctx.fillStyle = 'rgba(200,180,255,0.7)';
    ctx.shadowBlur = 0;
    ctx.fillText('OLEADA ' + wave, W / 2, 25);

    // Lives — top right
    ctx.textAlign = 'right';
    ctx.shadowBlur = 0;
    for (let i = 0; i < lives; i++) {
        const lx = W - 25 - i * 30;
        const ly = 22;
        ctx.fillStyle = WEAPONS[weaponIndex].color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = WEAPONS[weaponIndex].color;
        // Mini capsule
        ctx.beginPath();
        ctx.roundRect(lx - 10, ly - 5, 20, 10, 5);
        ctx.fill();
    }

    // Weapon indicator — bottom center
    const w = WEAPONS[weaponIndex];
    ctx.textAlign = 'center';

    // Background bar
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 150, H - 38, 300, 30, 8);
    ctx.fill();

    // Weapon name
    ctx.shadowBlur = 8;
    ctx.shadowColor = w.color;
    ctx.fillStyle = w.color;
    ctx.font = '700 14px Orbitron, monospace';
    ctx.fillText(w.name, W / 2, H - 18);

    // Arrow indicators
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '400 14px Rajdhani, sans-serif';
    ctx.shadowBlur = 0;
    ctx.fillText('◄', W / 2 - 130, H - 18);
    ctx.fillText('►', W / 2 + 130, H - 18);

    // Weapon color dot
    ctx.fillStyle = w.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = w.color;
    ctx.beginPath();
    ctx.arc(W / 2 - 95, H - 22, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W / 2 + 95, H - 22, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function renderGameOver() {
    ctx.save();
    ctx.fillStyle = 'rgba(5, 0, 15, 0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // GAME OVER
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#ff2244';
    ctx.fillStyle = '#ff4466';
    ctx.font = '900 52px Orbitron, monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);

    // Score
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#cc66ff';
    ctx.fillStyle = '#fff';
    ctx.font = '700 20px Orbitron, monospace';
    ctx.fillText('PUNTUACIÓN: ' + score, W / 2, H / 2 + 10);

    // Wave reached
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(200,180,255,0.7)';
    ctx.font = '600 15px Rajdhani, sans-serif';
    ctx.fillText('Oleada alcanzada: ' + wave, W / 2, H / 2 + 40);

    // High score
    if (score >= highScore) {
        ctx.fillStyle = '#ffcc00';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffcc00';
        ctx.font = '700 16px Orbitron, monospace';
        ctx.fillText('¡NUEVO RÉCORD!', W / 2, H / 2 + 75);
    } else {
        ctx.fillStyle = 'rgba(255,200,50,0.6)';
        ctx.font = '600 14px Rajdhani, sans-serif';
        ctx.fillText('Récord: ' + highScore, W / 2, H / 2 + 75);
    }

    // Restart
    if (Math.floor(gameTime * 2) % 2 === 0) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ccff';
        ctx.fillStyle = '#fff';
        ctx.font = '700 16px Orbitron, monospace';
        ctx.fillText('PRESIONA ESPACIO PARA REINICIAR', W / 2, H / 2 + 130);
    }

    ctx.restore();
}

// ============================================================
//  GAME INIT / RESET
// ============================================================
function startGame() {
    state = 'waveIntro';
    score = 0;
    lives = 3;
    wave = 1;
    weaponIndex = 0;
    px = W / 2;
    py = H - 80;
    playerInvTimer = 0;
    bullets = [];
    enemyBullets = [];
    particles = [];
    scorePopups = [];
    screenShake = 0;
    waveIntroTimer = 2.0;
    spawnWave(wave);
    SFX.powerUp();
}

// ============================================================
//  MAIN LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame((t) => {
    lastTime = t;
    gameLoop(t);
});

// ============================================================
//  roundRect polyfill (for older browsers)
// ============================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        this.moveTo(x + r[0], y);
        this.lineTo(x + w - r[1], y);
        this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
        this.lineTo(x + w, y + h - r[2]);
        this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
        this.lineTo(x + r[3], y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
        this.lineTo(x, y + r[0]);
        this.quadraticCurveTo(x, y, x + r[0], y);
        this.closePath();
        return this;
    };
}
